<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="一个从生活选择出发的信念人格测试。18 道题，看看你最常依靠的判断方式，以及容易发生的价值拉扯。"
    />
    <meta name="theme-color" content="#ffffff" />
    <title>你靠什么相信世界？｜信念人格测试</title>
    <link rel="stylesheet" href="styles.css?v=7" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="./" aria-label="返回测试首页">
          <span class="brand-mark">φ</span>
          <span>信念人格测试</span>
        </a>
        <div class="privacy-note">答案仅在你的设备上计算</div>
      </header>

      <main id="app" class="app" aria-live="polite">
        <section id="homeScreen" class="screen home-screen">
          <div class="hero-kicker">18 个生活场景 · 约 5 分钟</div>
          <h1>当没有标准答案时，<br />你靠什么相信世界？</h1>
          <p class="hero-intro">
            当信息不全、不同价值互相冲突时，人往往会先抓住某一种判断依据。
            结果包括你最常用和次常用的方式，以及两者容易发生冲突的地方。
          </p>

          <div class="result-preview" aria-label="测试结果预览">
            <article>
              <span class="preview-number">01</span>
              <h2>主要与辅助倾向</h2>
              <p>你最常依靠的判断方式，以及用来补充它的第二种方式。</p>
            </article>
            <article>
              <span class="preview-number">02</span>
              <h2>核心价值拉扯</h2>
              <p>两种你都在意、却经常难以同时满足的价值。</p>
            </article>
          </div>

          <div class="home-actions">
            <button id="startButton" class="primary-button" type="button">
              开始测试
              <span aria-hidden="true">→</span>
            </button>
            <button id="resumeButton" class="text-button hidden" type="button">继续上次作答</button>
          </div>

          <div class="home-footnote">
            <span>没有正确答案</span>
            <span>不需要专业知识</span>
            <span>结果可以随经历改变</span>
          </div>
        </section>

        <section id="quizScreen" class="screen quiz-screen hidden">
          <div class="quiz-topline">
            <button id="quitButton" class="icon-button" type="button" aria-label="退出测试">×</button>
            <div class="progress-wrap" aria-label="答题进度">
              <div class="progress-meta">
                <span id="progressText">第 1 / 18 题</span>
                <span id="progressPercent">6%</span>
              </div>
              <div class="progress-track">
                <div id="progressBar" class="progress-bar"></div>
              </div>
            </div>
          </div>

          <div class="question-wrap">
            <p class="question-hint">先选一个最接近的，再选一个次接近的</p>
            <h2 id="questionText" class="question-text"></h2>
            <div id="optionsList" class="options-list" role="group" aria-label="选项"></div>
            <p id="selectionHint" class="selection-hint">请选择第一选择</p>
          </div>

          <div class="quiz-actions">
            <button id="backButton" class="secondary-button" type="button">上一题</button>
            <button id="resetSelectionButton" class="text-button" type="button">重选本题</button>
            <button id="nextButton" class="primary-button compact" type="button" disabled>下一题</button>
          </div>
        </section>

        <section id="resultScreen" class="screen result-screen hidden">
          <div id="resultContent"></div>
          <div class="result-actions no-print">
            <button id="shareButton" class="primary-button" type="button">分享结果</button>
            <button id="printButton" class="secondary-button" type="button">保存 / 打印</button>
            <button id="restartButton" class="text-button" type="button">重新测试</button>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <p>结果只反映你在这组题里的选择，不用于诊断、招聘或替代专业判断。</p>
      </footer>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="questions.js?v=7"></script>
    <script src="app.js?v=7"></script>
  </body>
</html>
